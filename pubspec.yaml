name: precision_fitness_flow
version: 0.1.0
description: >
  Precision Fitness & Flow – Open Source, datenschutzfreundliche Fitness-App (Flutter, Web, Android, iOS)

publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^13.2.0
  audioplayers: ^5.2.1

  # UI
  cupertino_icons: ^1.0.6
  wakelock_plus: ^1.5.1
  vibration: ^3.1.8
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
